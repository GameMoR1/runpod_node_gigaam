name: Build and push to Docker Hub

on:
  push:
    branches:
      - prod

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: gigaam_node

jobs:
  build-and-push:
    name: Build and push gigaam node
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub username
        run: |
          if [ -z "${{ env.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::DOCKERHUB_USERNAME is not set. Add repository Variable or Secret DOCKERHUB_USERNAME (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
